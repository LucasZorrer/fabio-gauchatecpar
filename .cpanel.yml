---
deployment:
  tasks:
    # Caminho de destino dentro do servidor NuvolaHost.
    # Usuário cPanel: gauchate
    - export DEPLOYPATH=/home/gauchate/public_html/

    # --- Arquivos da raiz do site ---
    - /bin/cp index.html                    $DEPLOYPATH
    - /bin/cp styles.css                    $DEPLOYPATH
    - /bin/cp script.js                     $DEPLOYPATH
    - /bin/cp send-contact.js               $DEPLOYPATH
    - /bin/cp politica-de-privacidade.html  $DEPLOYPATH
    - /bin/cp termos-de-uso.html            $DEPLOYPATH

    # --- Pastas (cópia recursiva) ---
    - /bin/cp -R assets                     $DEPLOYPATH
    - /bin/cp -R config                     $DEPLOYPATH
    - /bin/cp -R admin                      $DEPLOYPATH

    # --- Conteudo editado pelo /admin ---
    # O arquivo data/content.json e a fonte da verdade do admin no servidor.
    # Copiamos apenas na primeira instalacao; depois disso, deploys nao
    # sobrescrevem os textos/numeros alterados pelo painel.
    - /bin/mkdir -p                         $DEPLOYPATH/data
    - if [ ! -f "$DEPLOYPATH/data/content.json" ]; then /bin/cp data/content.json "$DEPLOYPATH/data/content.json"; fi
